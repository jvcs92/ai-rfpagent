name: 24-Hour Portugal RFP Agent

on:
  schedule:
    # Runs every hour at minute 0
    - cron: '0 * * * *'
  workflow_dispatch: # Allows manual triggering from GitHub UI

jobs:
  run-rfp-agent:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Grants permission to commit state back to repository

    steps:
      - name: 1. Checkout Repository
        uses: actions/checkout@v4

      - name: 2. Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 3. Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 4. Execute RFP Agent Chunk
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
          SENDER_PASSWORD: ${{ secrets.SENDER_PASSWORD }}
        run: |
          python rfp_agent.py

      - name: 5. Commit & Push Updated State and Buffers
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action Bot"
          git add state.json daily_buffer.csv rfp_memory.csv
          git diff-index --quiet HEAD || git commit -m "[RFP Agent] Progress state & daily buffer"
          git push